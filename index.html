<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betta info 2.0</title>
  </head>
  <body>
    <aside>
      <div id="finder">
        <div class="box p" id="filters"></div>
      </div>
    
      <button class="btn p w-full" type="button" id="toggle">
        <svg class="icon" width="1em" height="1em">
          <use href="#icon-find"></use>
        </svg>
        <span>Find</span>
      </button>
    </aside>
    
    <main>
      <h1 class="box">Betta info 2.0</h1>
      <input type="hidden" id="search-input">
    
      <section id="grid" class="box p show">
        <ul id="list" class="grid-responsive scroll-y"></ul>
      </section>
      
      <section id="detail" class="box p"></section>
      
      <a href="#" id="back">
        <div class="box btn p">
          <svg class="icon" width="1em" height="1em">
            <use href="#icon-back"></use>
          </svg>
          <span>Back to list</span>
        </div>
      </a>
    </main>
    
    <button type="button" id="mask" aria-label="Drawer mask"></button>
    
    <!-- https://allsvgicons.com/pack/dinkie-icons/ -->
    
    <svg class="icons-list">
      <symbol id="icon-back" viewBox="0 0 12 12">
        <title xmlns="">left-arrow-circled-filled</title>
        <path fill="currentColor" d="M3 12h5v-1h2V9h1V4h-1V2H8V1H3v1H1v2H0v5h1v2h2Zm2-2V9H4V8H3V7H2V6h1V5h1V4h1V3h1v1H5v1h3v3H5v1h1v1Zm0 0"/>
      </symbol>
      
      <symbol id="icon-close" viewBox="0 0 12 12">
        <title xmlns="">black-cross-square-filled</title>
        <path fill="currentColor" d="M1 12h9v-1h1V2h-1V1H1v1H0v9h1Zm2-3V8h1V7h1V6H4V5H3V4h1v1h1v1h1V5h1V4h1v1H7v1H6v1h1v1h1v1H7V8H6V7H5v1H4v1Zm0 0"/>
      </symbol>
      
      <symbol id="icon-close-inner" viewBox="0 0 12 12">
        <title xmlns="">black-cross-square</title>
        <path fill="currentColor" d="M1 2H0v9h1Zm0 0h9V1H1Zm0 10h9v-1H1Zm2-3h1V8H3Zm1-1h1V7H4Zm1-1h1V6H5ZM3 5h1V4H3Zm1 1h1V5H4Zm2 2h1V7H6Zm1 1h1V8H7ZM6 6h1V5H6Zm1-1h1V4H7Zm3 6h1V2h-1Zm0 0"/>
      </symbol>
      
      <symbol id="icon-find" viewBox="0 0 12 12">
        <title xmlns="">left-magnifying-glass-filled</title>
        <path fill="currentColor" d="M3 8h3V7h1V4H6V3H3v1H2v3h1ZM1 9h1V8H1Zm1 1h4V9H2ZM0 8h1V3H0Zm1-5h1V2H1Zm7 9h2v-1h1V9h-1V8H8V7H7v1H6v1h1v2h1ZM2 2h5V1H2Zm6 5h1V3H8ZM7 3h1V2H7Zm0 0"/>
      </symbol>
      
      <symbol id="icon-right" viewBox="0 0 12 12">
        <title xmlns="">right-triangle</title>
        <polygon fill="currentColor" points="8.01 5 7.01 5 7.01 4 6.01 4 6.01 3 5.01 3 5.01 2 4.01 2 4.01 1 3.01 1 3.01 4 3.01 8 3.01 11 4.01 11 4.01 10 5.01 10 5.01 9 6.01 9 6.01 8 7.01 8 7.01 7 7.01 6.99 8 6.99 8 6 8.01 6 8.01 5"/>
      </symbol>
      
      <symbol id="icon-group" viewBox="0 0 12 12">
        <title xmlns="">three-networked-computers</title>
        <path fill="currentColor" d="M0 12h5V8H3V7h5v1H6v4h5V8H9V7h2V6H6V5h2V1H3v4h2v1H0v1h2v1H0Zm1-1V9h3v2Zm6 0V9h3v2ZM4 4V2h3v2Zm0 0"/>
      </symbol>
      
      <symbol id="icon-heart" viewBox="0 0 12 12">

        <path fill="currentColor" d="M5 10h1V9h1V8h1V7h1V5H8V4H6v1H5V4H3v1H2v2h1v1h1v1h1Zm-4 0h1V9H1Zm1 1h1v-1H2ZM0 9h1V4H0Zm3 3h5v-1H3ZM1 4h1V3H1Zm7 7h1v-1H8ZM2 3h1V2H2Zm7 7h1V9H9ZM3 2h5V1H3Zm7 7h1V4h-1ZM8 3h1V2H8Zm1 1h1V3H9Zm0 0"/>

      </symbol>
      
      <symbol id="icon-fish" viewBox="0 0 12 12">

        <path fill="currentColor" d="M0 12h11V6h-1v1H9V6H8V5H7v1H6v1H5v1H4v2H3V8H2v1H1V8H0Zm1-4h1V6H1Zm2 0h1V5H3V4H2v2h1Zm1-3h1V4H4Zm1-1h1V2H5Zm2 0h1V2H7Zm2 2h1V3H9v1H8v1h1ZM6 2h1V1H6Zm0 0"/>
      </symbol>
      
      <symbol id="icon-thermometer" viewBox="0 0 12 12">
        <title xmlns="">thermometer</title>
        <path fill="currentColor" d="M7 12h3v-1h1V8h-1v1H9V8h1V7H8v1H7v1H6v2h1ZM1 5h1V4H1Zm1 1h1V5H2Zm1 1h1V6H3Zm1 1h1V7H4Zm1 1h1V8H5ZM0 4h1V2H0Zm6 4h1V7H6ZM5 7h1V6H5ZM4 6h1V5H4ZM1 2h2V1H1Zm6 5h1V6H7ZM6 6h1V5H6ZM5 5h1V4H5ZM4 4h1V3H4ZM3 3h1V2H3Zm0 0"/>

    <script src="./script.js"></script>
  </body>
</html>
